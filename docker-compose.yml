version: "3.9"

# ── claims-slm infrastructure stack ──────────────────────────────────────────
#
# Services:
#   ollama         — Ollama model server (serves claims-slm at :11434)
#   trainer        — One-shot LoRA fine-tuning job (exits after training)
#   cognitive-loop — Node.js cognitive loop API (exposes :3100)
#   ttruthdesk-ctc — CTC sidecar for ttruthdesk-platform (exposes :7700)
#   clf-ctc        — CTC sidecar for cognitive-loop-framework (exposes :7701)
#
# Usage:
#   docker compose up -d ollama cognitive-loop             # Start the runtime
#   docker compose up -d ollama cognitive-loop ttruthdesk-ctc clf-ctc  # With CTC
#   docker compose run --rm trainer                        # Trigger a training run
#
# Environment variables (set in .env or override on CLI):
#   CORPUS_PATH          Path to JSONL training corpus (default: /data/corpus/corpus.jsonl)
#   ADAPTER_PATH         Path to write/read LoRA adapter weights (default: /data/adapter)
#   OLLAMA_MODEL         Ollama model name (default: claims-slm)
#   COGNITIVE_LOOP_PORT  Port for the cognitive loop API (default: 3100)
#   TTRUTHDESK_URL       URL of the ttruthdesk-platform backend (for webhook integration)
#   ORNITH_HF_TOKEN      HuggingFace token to download Ornith-1.0-9B weights
#   ORNITH_GPU_UTIL      GPU memory utilisation for vLLM (default: 0.85)
#   CTC_TTRUTHDESK_PORT  Port for the ttruthdesk CTC sidecar (default: 7700)
#   CTC_CLF_PORT         Port for the CLF CTC sidecar (default: 7701)
#   EVOLVA_MRAGENT_PATH  Path to evolva-mragent repo (default: ../evolva-mragent)
#
# Ornith-1.0-9B usage:
#   docker compose up -d ornith-vllm cognitive-loop   # Use Ornith instead of Ollama
#   Set LLM_PROVIDER=ornith_slm in ttruthdesk .env to route traffic to Ornith

x-common-env: &common-env
  OLLAMA_HOST: http://ollama:11434
  CORPUS_PATH: ${CORPUS_PATH:-/data/corpus/corpus.jsonl}
  ADAPTER_PATH: ${ADAPTER_PATH:-/data/adapter}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-claims-slm}

x-ctc-env: &ctc-env
  EVOLVA_MRAGENT_PATH: ${EVOLVA_MRAGENT_PATH:-/evolva-mragent}
  CTC_LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ── Ollama model server ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: claims-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./Modelfile:/modelfile/Modelfile:ro
      - adapter-data:/data/adapter:ro
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - slm-net

  # ── Model initialiser (runs once, then exits) ─────────────────────────────
  # Pulls the base model and creates the claims-slm model from the Modelfile.
  # Run: docker compose run --rm model-init
  model-init:
    image: ollama/ollama:latest
    container_name: claims-model-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./Modelfile:/modelfile/Modelfile:ro
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling base model..."
        ollama pull qwen2.5-coder:1.5b-instruct
        echo "Creating claims-slm from Modelfile..."
        ollama create claims-slm -f /modelfile/Modelfile
        echo "Model ready."
    networks:
      - slm-net
    profiles:
      - init

  # ── Ornith-1.0-9B via vLLM (OpenAI-compatible inference) ────────────────
  # Serves Ornith-1.0-9B at :8080 with an OpenAI-compatible API.
  # Requires an NVIDIA GPU with ≥19 GB VRAM (A10G / L4 / RTX 4090).
  # Set LLM_PROVIDER=ornith_slm in ttruthdesk .env to route all LLM traffic here.
  #
  # Run: docker compose up -d ornith-vllm
  ornith-vllm:
    image: vllm/vllm-openai:latest
    container_name: claims-ornith-vllm
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ornith-weights:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${ORNITH_HF_TOKEN:-}
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    command:
      - --model
      - DeepReinforce/Ornith-1.0-9B
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - --gpu-memory-utilization
      - "${ORNITH_GPU_UTIL:-0.85}"
      - --max-model-len
      - "32768"
      - --dtype
      - bfloat16
      - --enable-prefix-caching
      - --served-model-name
      - ornith-1.0-9b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - slm-net
    profiles:
      - ornith

  # ── LoRA fine-tuning trainer (one-shot job) ───────────────────────────────
  # Runs the fine-tuning pipeline and exits. The adapter weights are written
  # to the shared adapter-data volume. After this job completes, run
  # model-refresh to update the Ollama model.
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: claims-trainer
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - corpus-data:/data/corpus
      - adapter-data:/data/adapter
      - ./Modelfile:/app/Modelfile:ro
    environment:
      <<: *common-env
      PYTHONUNBUFFERED: "1"
    command:
      - python
      - finetunePipeline.py
      - --corpus
      - /data/corpus/corpus.jsonl
      - --output
      - /data/adapter
      - --cpu
    networks:
      - slm-net
    profiles:
      - training

  # ── Model refresh (runs after trainer, updates Ollama) ────────────────────
  model-refresh:
    image: ollama/ollama:latest
    container_name: claims-model-refresh
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./Modelfile:/modelfile/Modelfile:ro
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Refreshing claims-slm model..."
        ollama create claims-slm -f /modelfile/Modelfile
        echo "Model refreshed."
    networks:
      - slm-net
    profiles:
      - training

  # ── CTC sidecar — ttruthdesk-platform ────────────────────────────────────
  # Python sidecar that runs the MRAgent CTC memory graph for ttruthdesk.
  # Exposes a JSON-RPC socket at :7700 for ingest_cycle, reconstruct,
  # temporal_query, event_keywords, and edges_by_tag.
  #
  # Run: docker compose up -d ttruthdesk-ctc
  ttruthdesk-ctc:
    image: python:3.11-slim
    container_name: claims-ttruthdesk-ctc
    restart: unless-stopped
    ports:
      - "${CTC_TTRUTHDESK_PORT:-7700}:7700"
    volumes:
      - ctc-data:/data/ctc
      - ${EVOLVA_MRAGENT_PATH:-../evolva-mragent}:/evolva-mragent:ro
    environment:
      <<: *ctc-env
      CTC_DB_PATH: /data/ctc/ttruthdesk_ctc.db
      CTC_SIDECAR_PORT: "7700"
      CTC_INSTANCE: ttruthdesk
    working_dir: /evolva-mragent
    entrypoint: ["python", "-u", "ctc_sidecar.py",
                 "--db", "/data/ctc/ttruthdesk_ctc.db",
                 "--port", "7700"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',7700),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - slm-net
    profiles:
      - ctc

  # ── CTC sidecar — cognitive-loop-framework ───────────────────────────────
  # Python sidecar that runs the MRAgent CTC memory graph for CLF.
  # Exposes a JSON-RPC socket at :7701.
  #
  # Run: docker compose up -d clf-ctc
  clf-ctc:
    image: python:3.11-slim
    container_name: claims-clf-ctc
    restart: unless-stopped
    ports:
      - "${CTC_CLF_PORT:-7701}:7701"
    volumes:
      - ctc-data:/data/ctc
      - ${EVOLVA_MRAGENT_PATH:-../evolva-mragent}:/evolva-mragent:ro
    environment:
      <<: *ctc-env
      CTC_DB_PATH: /data/ctc/clf_ctc.db
      CTC_SIDECAR_PORT: "7701"
      CTC_INSTANCE: clf
    working_dir: /evolva-mragent
    entrypoint: ["python", "-u", "ctc_sidecar.py",
                 "--db", "/data/ctc/clf_ctc.db",
                 "--port", "7701"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.create_connection(('localhost',7701),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - slm-net
    profiles:
      - ctc

  # ── Cognitive loop API ────────────────────────────────────────────────────
  # Node.js service that exposes the 5-layer cognitive loop HTTP API.
  # Connects to Ollama for inference and to ttruthdesk for verdict events.
  cognitive-loop:
    image: node:20-slim
    container_name: claims-cognitive-loop
    working_dir: /app
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${COGNITIVE_LOOP_PORT:-3100}:3100"
    volumes:
      - corpus-data:/data/corpus
      - adapter-data:/data/adapter:ro
      - ./cortex.yaml:/app/cortex.yaml:ro
      # Mount the cognitive-loop-framework source (dev mode)
      # In production, replace with a built image
      - ${COGNITIVE_LOOP_SRC:-../cognitive-loop-framework}:/app/src:ro
    environment:
      <<: *common-env
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3100"
      TTRUTHDESK_URL: ${TTRUTHDESK_URL:-http://host.docker.internal:3000}
      CORPUS_TRAINING_THRESHOLD: ${CORPUS_TRAINING_THRESHOLD:-50}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - slm-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  ollama-data:
    driver: local
    labels:
      com.claims-slm.description: "Ollama model weights and registry"

  corpus-data:
    driver: local
    labels:
      com.claims-slm.description: "JSONL training corpus (grows with each verified claim)"

  adapter-data:
    driver: local
    labels:
      com.claims-slm.description: "LoRA adapter weights (written by trainer, read by Ollama)"

  ornith-weights:
    driver: local
    labels:
      com.claims-slm.description: "Ornith-1.0-9B model weights cache (HuggingFace hub download)"

  ctc-data:
    driver: local
    labels:
      com.claims-slm.description: "CTC SQLite databases for ttruthdesk and CLF sidecars"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  slm-net:
    driver: bridge
    labels:
      com.claims-slm.description: "Internal network for claims-slm services"
